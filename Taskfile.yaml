version: "3"

tasks:
  build:
    desc: Build the package
    cmds:
      - go build ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    cmds:
      - gofmt -s -w .

  check:
    desc: Run all checks (vet, lint, test)
    cmds:
      - task: vet
      - task: lint
      - task: test

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f coverage.out
